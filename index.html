<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议通知发布工具</title>
<script src="jszip.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
  .header { background: #1a73e8; color: #fff; padding: 16px 24px; text-align: center; font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  .container { max-width: 720px; margin: 20px auto; padding: 0 16px 40px; }
  .card { background: #fff; border-radius: 10px; padding: 24px 28px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 4px; }
  .hint { font-weight: 400; color: #999; font-size: 12px; }
  input[type="text"], textarea { width: 100%; padding: 8px 12px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 14px; line-height: 1.6; color: #333; transition: border-color .2s; }
  input[type="text"]:focus, textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
  input[type="date"] { padding: 8px 12px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 14px; color: #333; }
  input[type="date"]:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
  textarea { resize: vertical; min-height: 64px; }
  .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .row .form-group { flex: 1; min-width: 130px; }
  .mt8 { margin-top: 8px; }
  .radio-group { display: flex; gap: 20px; padding: 6px 0; }
  .radio-group label { display: flex; align-items: center; gap: 6px; font-weight: 400; cursor: pointer; font-size: 14px; }
  .radio-group input[type="radio"] { accent-color: #1a73e8; }
  .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; max-height: 280px; overflow-y: auto; padding: 8px; border: 1px solid #e0e0e0; border-radius: 6px; background: #fafafa; }
  .checkbox-grid label { display: flex; align-items: center; gap: 5px; font-weight: 400; font-size: 13px; cursor: pointer; padding: 2px 4px; border-radius: 3px; }
  .checkbox-grid label:hover { background: #e8f0fe; }
  .checkbox-grid input[type="checkbox"] { accent-color: #1a73e8; }
  .check-actions { display: flex; gap: 10px; margin-bottom: 6px; }
  .btn-link { background: none; border: none; color: #1a73e8; cursor: pointer; font-size: 12px; padding: 0; }
  .btn-link:hover { text-decoration: underline; }
  .selected-count { font-size: 12px; color: #888; line-height: 24px; }
  .agenda-item { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .agenda-item .num { color: #666; font-size: 13px; min-width: 20px; text-align: right; }
  .agenda-item input { flex: 1; }
  .btn-sm { padding: 5px 10px; font-size: 12px; border: 1px solid #d0d5dd; border-radius: 5px; cursor: pointer; background: #fff; color: #555; }
  .btn-sm:hover { background: #f0f0f0; }
  .btn-sm.danger { color: #c62828; border-color: #f5c6cb; }
  .btn-sm.danger:hover { background: #fdf2f2; }
  .btn-primary { display: block; width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:disabled { background: #8cb8f0; cursor: not-allowed; }
  .msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; display: none; }
  .msg.ok { display: block; background: #e6f7e6; color: #2e7d32; }
  .msg.err { display: block; background: #fdecea; color: #c62828; }
  .preview { margin-top:6px; font-size:13px; color:#888; }
</style>
</head>
<body>
<div class="header">会议通知发布工具</div>
<div class="container">
  <div id="msg" class="msg"></div>
  <form id="mainForm">
    <div class="card">
      <div class="form-group">
        <label>会议名称 <span class="hint">（必选）</span></label>
        <div class="radio-group">
          <label><input type="radio" name="meeting_type" value="线上" checked> 线上研讨</label>
          <label><input type="radio" name="meeting_type" value="线下"> 线下研讨</label>
        </div>
        <div class="preview">预览：PLM-CBTA-整体大纲-多发商照开发<span id="mtp">线上</span>研讨</div>
      </div>
    </div>
    <div class="card">
      <div class="form-group">
        <label>会议时间 <span class="hint">（必填）</span></label>
        <div class="row"><div class="form-group"><span class="hint">开始日期</span><input type="date" name="date_start" required></div><div class="form-group"><span class="hint">开始时间</span><input type="text" name="time_start" placeholder="如 下午19:00"></div></div>
        <div class="row mt8"><div class="form-group"><span class="hint">结束日期（单天留空）</span><input type="date" name="date_end"></div><div class="form-group"><span class="hint">结束时间</span><input type="text" name="time_end" placeholder="如 下午17:00"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="form-group"><label>会议地点 <span class="hint">（必填）</span></label><input type="text" name="place" placeholder="如：线上腾讯会议（会议号：xxx）" required></div>
    </div>
    <div class="card">
      <div class="form-group">
        <label>参会人员</label>
        <div class="check-actions"><button type="button" class="btn-link" onclick="selectAll()">全选</button><button type="button" class="btn-link" onclick="deselectAll()">取消全选</button><span class="selected-count" id="sc">已选 0 人</span></div>
        <div class="checkbox-grid" id="cg"></div>
      </div>
    </div>
    <div class="card">
      <div class="form-group"><label>会议安排</label><div id="agendaList"><div class="agenda-item"><span class="num">1.</span><input type="text" placeholder="第1项安排"><button type="button" class="btn-sm danger" onclick="rmA(this)" style="display:none">×</button></div></div><button type="button" class="btn-sm" onclick="addA()" style="margin-top:6px">+ 添加一项</button></div>
    </div>
    <div class="card">
      <div class="row"><div class="form-group"><label>联系人姓名</label><input type="text" name="contact_name" placeholder="姓名"></div><div class="form-group"><label>联系电话</label><input type="text" name="contact_phone" placeholder="电话"></div></div>
    </div>
    <div class="card">
      <div class="form-group"><label>备注 <span class="hint">（可选）</span></label><textarea name="notes" rows="2" placeholder="日程安排等补充信息"></textarea></div>
    </div>
    <button type="submit" class="btn-primary" id="btn">生成 Word 文件</button>
  </form>
</div>

<script>
// ==== Personnel ====
const PERSONNEL = ['关禹','姜超','陈清','仝航航','高振兴','高函杨','牟云天','刘西琪','李国珍','王天瑞','杨建龙','皮佳璐','蔡中长','张晓晴','陈丰华','潘路生','司海青','邓超','康永杰','程海涛','高培新','金悦晨','王倩','汪海波','刘超智','徐亚楠','刘京茂','何勇'];
const cg = document.getElementById('cg');
PERSONNEL.forEach(name => {const l=document.createElement('label');l.innerHTML=`<input type="checkbox" name="att" value="${name}" onchange="upCnt()"> ${name}`;cg.appendChild(l);});
function upCnt(){document.getElementById('sc').textContent='已选 '+document.querySelectorAll('input[name="att"]:checked').length+' 人';}
function selectAll(){document.querySelectorAll('input[name="att"]').forEach(c=>c.checked=true);upCnt();}
function deselectAll(){document.querySelectorAll('input[name="att"]').forEach(c=>c.checked=false);upCnt();}

// ==== Agenda ====
function addA(){const l=document.getElementById('agendaList'),n=l.querySelectorAll('.agenda-item').length+1,d=document.createElement('div');d.className='agenda-item';d.innerHTML=`<span class="num">${n}.</span><input type="text" placeholder="第${n}项安排"><button type="button" class="btn-sm danger" onclick="rmA(this)">×</button>`;l.appendChild(d);updA();}
function rmA(b){const l=document.getElementById('agendaList').querySelectorAll('.agenda-item');if(l.length<=1)return;b.parentElement.remove();updA();}
function updA(){document.getElementById('agendaList').querySelectorAll('.agenda-item').forEach((e,i)=>{e.querySelector('.num').textContent=(i+1)+'.';const d=e.querySelector('.btn-sm');if(d)d.style.display=document.getElementById('agendaList').querySelectorAll('.agenda-item').length>1?'':'none';});}

// ==== Meeting type ====
document.querySelectorAll('input[name="meeting_type"]').forEach(r=>r.addEventListener('change',()=>document.getElementById('mtp').textContent=r.value));

// ==== Default date ====
document.querySelector('input[name="date_start"]').value=new Date().toISOString().slice(0,10);

// ==== Format date ====
function fmtD(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return y+'年'+parseInt(m)+'月'+parseInt(d)+'日';}

document.getElementById('mainForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const btn=document.getElementById('btn'),msg=document.getElementById('msg');
  btn.disabled=true;btn.textContent='正在生成...';msg.className='msg';

  try {
    const fd=new FormData(e.target);

    // Build meeting name
    const meetingType=fd.get('meeting_type');
    const meetingName='PLM-CBTA-整体大纲-多发商照开发'+meetingType+'研讨';

    // Build meeting time
    const ds=fmtD(fd.get('date_start')),ts=fd.get('time_start')||'';
    const de=fmtD(fd.get('date_end')),te=fd.get('time_end')||'';
    let meetingTime=de?(ds+ts+'-'+de+te):(ds+ts);

    // Attendees
    const attendees=fd.getAll('att').join(' ');

    // Agenda lines
    const agendaLines=[];
    document.querySelectorAll('#agendaList input').forEach(i=>{if(i.value.trim())agendaLines.push(i.value.trim());});

    // Contact
    const contact=((fd.get('contact_name')||'')+' '+(fd.get('contact_phone')||'')).trim();
    const notes=fd.get('notes')||'';
    const dateStr=ds;

    // Decode template
    const tplBytes=Uint8Array.from(atob(TPL_B64),c=>c.charCodeAt(0));

    // Unzip template
    const zip=await JSZip.loadAsync(tplBytes);

    // Get document.xml
    let docXml=await zip.file('word/document.xml').async('text');

    // Parse XML
    const parser=new DOMParser();
    const xmlDoc=parser.parseFromString(docXml,'text/xml');

    // Namespace resolver
    const ns='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
    function qn(tag){return '{'+ns+'}'+tag;}

    // Get all table rows
    const trs=xmlDoc.getElementsByTagNameNS(ns,'tr');
    console.log('Found',trs.length,'table rows');

    // ---- Helper: get all text from a cell ----
    function getCellText(tc){
      const ts=tc.getElementsByTagNameNS(ns,'t');
      return Array.from(ts).map(t=>t.textContent||'').join('');
    }

    // ---- Helper: set text in a cell, distributing across existing runs ----
    function setCellText(tc,newText){
      const paras=tc.getElementsByTagNameNS(ns,'p');
      if(paras.length===0)return;

      // Keep only first paragraph, remove the rest
      while(paras.length>1){
        paras[paras.length-1].parentNode.removeChild(paras[paras.length-1]);
      }

      // Use first paragraph
      const runs=paras[0].getElementsByTagNameNS(ns,'r');
      if(runs.length===0){
        // No runs, create one
        const r=xmlDoc.createElementNS(ns,'r');
        const t=xmlDoc.createElementNS(ns,'t');
        t.setAttribute('xml:space','preserve');
        t.textContent=newText;
        r.appendChild(t);
        paras[0].appendChild(r);
      } else if(runs.length===1){
        // One run - put all text there
        const ts=runs[0].getElementsByTagNameNS(ns,'t');
        if(ts.length>0){
          ts[0].textContent=newText;
        } else {
          // Run has no w:t element, create one
          const t=xmlDoc.createElementNS(ns,'t');
          t.setAttribute('xml:space','preserve');
          t.textContent=newText;
          runs[0].appendChild(t);
        }
      } else {
        // Multiple runs - put text in first, clear rest
        const ts0=runs[0].getElementsByTagNameNS(ns,'t');
        if(ts0.length>0){
          ts0[0].textContent=newText;
        } else {
          const t=xmlDoc.createElementNS(ns,'t');
          t.setAttribute('xml:space','preserve');
          t.textContent=newText;
          runs[0].appendChild(t);
        }
        for(let i=1;i<runs.length;i++){
          const ts=runs[i].getElementsByTagNameNS(ns,'t');
          for(const t of ts) t.textContent='';
        }
      }
    }

    // ---- Helper: set multi-line text in a cell ----
    function setCellMultiline(tc,lines){
      const paras=tc.getElementsByTagNameNS(ns,'p');
      if(paras.length===0)return;
      const firstPara=paras[0];

      // Remove extra paragraphs
      while(paras.length>1){
        paras[paras.length-1].parentNode.removeChild(paras[paras.length-1]);
      }

      if(!lines||lines.length===0){
        setCellText(tc,'');
        return;
      }

      // Set first line
      const runs=firstPara.getElementsByTagNameNS(ns,'r');
      if(runs.length>0){
        const ts=runs[0].getElementsByTagNameNS(ns,'t');
        if(ts.length>0) ts[0].textContent=lines[0];
        // Clear other runs
        for(let i=1;i<runs.length;i++){
          const ts=runs[i].getElementsByTagNameNS(ns,'t');
          for(const t of ts) t.textContent='';
        }
      }

      // For additional lines, clone first paragraph
      for(let i=1;i<lines.length;i++){
        const clone=firstPara.cloneNode(true);
        const cruns=clone.getElementsByTagNameNS(ns,'r');
        if(cruns.length>0){
          const cts=cruns[0].getElementsByTagNameNS(ns,'t');
          if(cts.length>0) cts[0].textContent=lines[i];
          for(let j=1;j<cruns.length;j++){
            const cts2=cruns[j].getElementsByTagNameNS(ns,'t');
            for(const t of cts2) t.textContent='';
          }
        }
        firstPara.parentNode.insertBefore(clone,firstPara.nextSibling);
      }
    }

    // Identify content cells
    // The template has 7 table rows, each with 2 cells
    // Cell[1] of each row is the content cell
    // We need to find the right table (there might be only one)

    const tbls=xmlDoc.getElementsByTagNameNS(ns,'tbl');
    if(tbls.length===0) throw new Error('模板中没有表格');

    const rows=tbls[0].getElementsByTagNameNS(ns,'tr');
    if(rows.length<7) throw new Error('表格行数不足: '+rows.length);

    function getCell(row,ci){
      const tcs=row.getElementsByTagNameNS(ns,'tc');
      return tcs[ci]||null;
    }

    // Row 0: meeting name
    setCellText(getCell(rows[0],1),meetingName);

    // Row 1: meeting time
    setCellText(getCell(rows[1],1),meetingTime);

    // Row 2: meeting place
    setCellText(getCell(rows[2],1),fd.get('place')||'');

    // Row 3: attendees
    setCellText(getCell(rows[3],1),attendees);

    // Row 4: agenda (multiline)
    setCellMultiline(getCell(rows[4],1),agendaLines);

    // Row 5: contact
    setCellText(getCell(rows[5],1),contact);

    // Row 6: notes
    setCellText(getCell(rows[6],1),notes);

    // Date paragraph (last paragraph with 年/月/日)
    const allParas=xmlDoc.getElementsByTagNameNS(ns,'p');
    for(let i=allParas.length-1;i>=0;i--){
      const txt=allParas[i].textContent||'';
      if(txt.includes('年')&&txt.includes('月')&&txt.includes('日')){
        const r=allParas[i].getElementsByTagNameNS(ns,'r');
        if(r.length>0){
          const ts=r[0].getElementsByTagNameNS(ns,'t');
          if(ts.length>0) ts[0].textContent=dateStr;
          for(let j=1;j<r.length;j++){
            const ts2=r[j].getElementsByTagNameNS(ns,'t');
            for(const t of ts2) t.textContent='';
          }
        }
        break;
      }
    }

    // Serialize back to XML
    const serializer=new XMLSerializer();
    docXml=serializer.serializeToString(xmlDoc);

    // Update the zip
    zip.file('word/document.xml',docXml);

    // Generate new docx
    const outBlob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});

    // Download
    const url=URL.createObjectURL(outBlob);
    const a=document.createElement('a');
    a.href=url;
    a.download='会议通知_'+meetingName.slice(0,30)+'.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    msg.textContent='Word 文件已生成并开始下载';
    msg.className='msg ok';
  } catch(err){
    console.error(err);
    msg.textContent='生成失败：'+err.message;
    msg.className='msg err';
  } finally{
    btn.disabled=false;
    btn.textContent='生成 Word 文件';
  }
});
</script>
</body>
</html>
